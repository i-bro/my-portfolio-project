<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Portfolio</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg custom-navbar">
      <div class="container-fluid">
        <a class="navbar-brand" href="#" id="logo" style="color: var(--text)"
          >Portfolio</a
        >

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNavDropdown"
          aria-controls="navbarNavDropdown"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon" style="filter: invert(1)"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNavDropdown">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a href="#about" class="nav-link">About</a>
            </li>
            <li class="nav-item">
              <a href="#projects" class="nav-link">Projects</a>
            </li>
            <li class="nav-item">
              <a href="#skills" class="nav-link">Skills</a>
            </li>
            <li class="nav-item">
              <a href="#contact" class="nav-link">Contact</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <header class="header">
      <section id="hero" class="hero vh-75">
        <h1 id="hero-name"></h1>
        <p id="hero-title"></p>
      </section>
    </header>

    <main>
      <section id="about"></section>
      <section id="projects" class="vh-75">
        <div id="projects-grid" class="grid-container"></div>
      </section>
      <section id="skills" class="vh-75"></section>
      <section id="contact">
        <div class="container">
          <h2 class="text-center mb-5">Get In Touch</h2>
          <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
              <form id="contact-form" class="p-4 rounded-4 shadow-sm">
                <div class="mb-3">
                  <label for="userName" class="form-label">Full Name</label>
                  <input
                    type="text"
                    name="user_name"
                    class="form-control custom-input"
                    id="userName"
                    placeholder="Your Name"
                    required
                  />
                </div>

                <div class="mb-3">
                  <label for="userEmail" class="form-label"
                    >Email Address</label
                  >
                  <input
                    type="email"
                    name="user_email"
                    class="form-control custom-input"
                    id="userEmail"
                    placeholder="name@example.com"
                    required
                  />
                </div>

                <div class="mb-3">
                  <label for="subject" class="form-label"
                    >Subject / Title</label
                  >
                  <input
                    type="text"
                    name="subject"
                    class="form-control custom-input"
                    id="subject"
                    placeholder="What is this about?"
                    required
                  />
                </div>

                <div class="mb-3">
                  <label for="message" class="form-label">Message</label>
                  <textarea
                    name="message"
                    class="form-control custom-input"
                    id="message"
                    rows="4"
                    placeholder="Your message..."
                    required
                  ></textarea>
                </div>

                <button
                  type="submit"
                  id="submit-btn"
                  class="btn btn-primary w-100 py-2"
                >
                  Send Message
                </button>
              </form>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script
      type="text/javascript"
      src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"
    ></script>
    <script type="module" src="./js/main.js"></script>
  </body>
</html>
